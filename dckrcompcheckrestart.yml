---
- name: Update Docker Compose stack
  hosts: "{{ target_hosts }}"
  become: true


  tasks:
    - name: Ensure compose_file variable is set
      ansible.builtin.fail:
        msg: "Variable 'compose_file' must be set to the absolute path of the docker-compose.yml"
      when: compose_file == ""

    - block:
        - name: Pull latest images
          community.docker.docker_compose_v2:
            project_src: "{{ compose_file | dirname }}"
            files: ["{{ compose_file | basename }}"]
            pull: always
            state: present

        - name: Stop containers
          community.docker.docker_compose_v2:
            project_src: "{{ compose_file | dirname }}"
            files: ["{{ compose_file | basename }}"]
            state: stopped

        - name: Start containers with updated images
          community.docker.docker_compose_v2:
            project_src: "{{ compose_file | dirname }}"
            files: ["{{ compose_file | basename }}"]
            state: present
          register: compose_up

        - name: Verify all containers are running
          ansible.builtin.assert:
            that:
              - compose_up.containers | selectattr('State', 'equalto', 'running') | list | length > 0
            fail_msg: "Update failed: no containers in running state after start"
            success_msg: "Update successful: all containers are running"

      rescue:
        - name: Log update failure
          ansible.builtin.debug:
            msg: "Update failed for {{ compose_file }} — attempting rollback by restarting containers"

        - name: Restart containers after failed update
          community.docker.docker_compose_v2:
            project_src: "{{ compose_file | dirname }}"
            files: ["{{ compose_file | basename }}"]
            state: present
          ignore_errors: true

      always:
        - name: Show container states
          community.docker.docker_compose_v2_info:
            project_src: "{{ compose_file | dirname }}"
            files: ["{{ compose_file | basename }}"]
          register: compose_info
          ignore_errors: true

        - name: Print container states
          ansible.builtin.debug:
            msg: "{{ item.Name }}: {{ item.State }}"
          loop: "{{ compose_info.containers | default([]) }}"